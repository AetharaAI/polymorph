version: 1
project:
  type: internal_harness
  name: AetherOps_PolyMorph_Internal
  product_mode: internal_only
runtime:
  primary_harness_path: mini-agent
  provider_mode: unified_openai_compat_gateway_with_model_routing_and_explicit_fallback_support
  primary_model: minicpm-v
  internal_operator_mode: true
  fleet_operator_enabled: true
  channel_control_plane_enabled: true
  channel_control_plane_status: telegram_webhook_bridge_scaffolded
  channel_reference_workspace: mcas
  fleet_inventory_dir: fleet-inventory
  fleet_helper_scripts_dir: fleet-inventory/scripts
  fleet_execution_transport: ssh_over_tailscale
  fleet_destructive_actions_require_confirmation: true
  direct_openai_base_url: https://api.openai.com/v1
  unified_gateway_base_url: https://api.aetherpro.tech/v1
  local_fallback_model_target: none_distinct_currently_configured
  explicit_fallback_enabled: true
  explicit_fallback_provider: openai_compat
  effective_distinct_fallback_present: false
  provider_env_load_order:
    - mini-agent/.env
    - mini-agent/backend/.env
    - mini-agent/.env.polymorph
  implicit_litellm_fallbacks_require_opt_in_when_explicit_fallback_exists: true
  split_client_facing_litellm_gateways_removed: true
  openai_compat_context_window_retry_enabled: true
  openai_compat_context_window_preflight_budgeting_enabled: true
  qwen_reasoning_mode_per_request_enabled: true
  qwen_production_default_enable_thinking: false
  context_window_errors_stop_cross_provider_failover: true
  context_window_errors_stop_no_tool_fallback: true
  dynamic_tool_selection_enabled: true
  history_compaction_budget_uses_effective_context_window: true
  harness_metadata_prompt_injection_default: false
  tool_manifest_enabled: true
  tool_manifest_path: mini-agent/backend/TOOLS.md
  dynamic_tool_schema_loading_enabled: true
  openai_compat_visible_reasoning_normalization_enabled: true
  openai_compat_raw_text_streaming_deferred_until_normalization: true
  temporal_context_enabled: true
  temporal_context_includes:
    - current_utc
    - current_local_time
    - resolved_timezone
    - unix_timestamp
    - session_created_at
    - elapsed_since_previous_user_turn
    - elapsed_since_previous_agent_run
  direct_audio_multimodal_enabled: false
  voice_mode_enabled: true
  voice_mode_path: live_asr_final_or_typed_voice_pane_to_qwen35_4b_to_realtime_tts_stream_with_http_fallback
  voice_agent_provider: openai_compat
  voice_agent_model: qwen3.5-4b
  voice_agent_base_url: https://api.aetherpro.tech/v1
  voice_realtime_tts_enabled: true
  voice_realtime_tts_transport: gateway_realtime_stream
  voice_model_to_model_streams_deferred: true
openai_notes:
  chat_completions_supported: true
  gpt5_requires_max_completion_tokens: true
  compat_extra_body_must_be_disabled_for_direct_openai: true
memory_notes:
  mongo_namespace_bootstrap_pending: false
  mongo_write_failures_should_not_block_primary_response: true
voice_services:
  asr_base_url: https://asr.aetherpro.us
  tts_base_url: https://tts.aetherpro.us
  mic_composer_flow: live_asr_websocket_partial_then_final_into_textbox
  voice_pane_flow: live_asr_final_transcript_to_qwen35_4b_then_http_tts_playback
  asr_gateway_auth_mode: optional_auth_omit_invalid_bearer
  live_operator_verified: true
  live_operator_verified_on: 2026-03-13
model_runner_state:
  tracked_layout_root: model-runners/
  l40s_90_active_voice_runner: qwen3.5-4b
  l40s_90_known_good_runners:
    - qwen3.5-35b
    - qwen3.5-9b
    - qwen3.5-4b
known_active_docs:
  topology: AETHERPRO_INFRA_TOPOLOGY.md
  node_access_note: Tailscale-&-Node-Access-Convo-Poly.md
  fleet_inventory: fleet-inventory/
  channel_reference_workspace: mcas/
  technical_reference: mini-agent/docs/AetherOps-Harness-Technical-Reference.md
  public_capabilities: mini-agent/docs/AetherOps-Harness-Public-Capabilities.md
  roadmap: mini-agent/docs/Autonomous-Control-Plane-Roadmap.md
  benchmark_tool_reference: HARNESS_TOOL_REFERENCE.md
