name: agent-harness-polymorph

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - ./.env
      - ./backend/.env
      - ./.env.polymorph
    ports:
      - "${HARNESS_BACKEND_PORT:-${MINIMAX_AGENT_BACKEND_PORT:-38333}}:8000"
    volumes:
      - backend_uploads:/app/backend/uploads
      - backend_replays:/app/backend/replays
      - ./backend/prompts:/app/backend/prompts:ro
      - ../agent_identity:/app/agent_identity:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 20s

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:38333}
    environment:
      NEXT_PUBLIC_BACKEND_URL: ${NEXT_PUBLIC_BACKEND_URL:-http://localhost:38333}
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "${HARNESS_FRONTEND_PORT:-${MINIMAX_AGENT_FRONTEND_PORT:-33333}}:3000"
    restart: unless-stopped

volumes:
  backend_uploads:
  backend_replays:
