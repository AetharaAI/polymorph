###########################################
# GENERAL SETTINGS
############################################
general_settings:
  master_key: sk-aether-master-pro
#  disable_auth: false                # temporary, you said you’ll add scoped keys later
  allow_user_auth: true
  enable_key_management: true

  database_url: postgresql://redwatch_ops:redwatch_ops_gmccmg_2026_infra@100.87.16.38:5440/litellm
  store_model_in_db: true

  use_redis_transaction_buffer: true
  redis_url: redis://:redwatch_ops_gmccmg_2026_infra@100.87.16.38:6380/0

############################################
# ROUTER SETTINGS (ONLY routing concerns)
############################################
router_settings:
  routing_strategy: least-busy
  num_retries: 2
  timeout: 600

  # Shared state (multi-instance safe)
  redis_host: "redis"
  redis_port: 6379
#  redis_password: redwatch_ops_gmccmg_2026_infra

  # Router-level response cache
  cache_params:
    type: redis
    host: "redis"
    port: 6379
    namespace: litellm.caching.caching
    ttl: 86400

#    password: redwatch_ops_gmccmg_2026_infra

############################################
# LITELLM SETTINGS (gateway behavior)
############################################
litellm_settings:
  cache: true
  cache_params:
    type: redis
    host: "redis"
    port: 6379
 #   redis_password: "redwatch_ops_gmccmg_2026_infra"
    namespace: litellm.caching.caching
    ttl: 86400

  drop_params: true
  allow_requests_on_db_unavailable: true
  litellm_dashboard: true

############################################
# MCP TOOLING (as you had it)
############################################
  # MCP server friendly aliases (optional shorthand)
  mcp_aliases:
    "fs": "filesystem_mcp"
    "think": "sequential_thinking_mcp"
    "search": "brave_search_mcp"
    "memory": "memory_mcp"
    "fabric": "fabric_gateway"

############################################
# MCP SERVERS
# These are LIVE public MCP servers - no API key needed
# for deepwiki and fetch. Add keys for others as noted.
############################################
mcp_servers:


  # ── Filesystem MCP: Read/write local files ──
  # Scoped to /data - change path to match your volume mount
  filesystem_mcp:
    transport: "stdio"
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-filesystem", "/aether-data"]
    description: "Read and write local files - scoped to /aether-data"

  # ── Memory MCP: Persistent key-value memory for agents ──
  # Stores agent memory in a local JSON file
  memory_mcp:
    transport: "stdio"
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-memory"]
    description: "Persistent agent memory store"

  # ── Brave Search: Real web search ──
  # Requires free Brave Search API key: https://api.search.brave.com/
  # Free tier: 2,000 queries/month
  brave_search_mcp:
    transport: "stdio"
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-brave-search"]
    env:
      BRAVE_API_KEY: "BSAE-0AJOooREYnpP9-wOBfGaW1fl3m"
  #   description: "Live web search via Brave Search API"

  # ── Sequential Thinking: Structured reasoning tool ──
  # Forces models to think step-by-step before answering
  # Great for Qwen3.5-122b complex tasks
  sequential_thinking_mcp:
    transport: "stdio"
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-sequential-thinking"]
    description: "Forces structured step-by-step reasoning"


