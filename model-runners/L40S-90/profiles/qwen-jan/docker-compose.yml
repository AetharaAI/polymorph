# ============================================
# FLEET PROFILE B: Reasoning + Code Worker
# Qwen3.5-35B-A3B + Jan-code-4B on L40S-90 (48GB)
# Total util: 55% + 22% = 77%
# ============================================

networks:
  aether-ops:
    external: true

services:
  qwen3.5-35b:
    image: vllm/vllm-openai:nightly
    container_name: qwen3.5-35b
    runtime: nvidia
    networks:
      - aether-ops
    extra_hosts:
      - host.docker.internal:host-gateway
    env_file:
      - path: .env
        required: false
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      VLLM_WORKER_MULTIPROC_METHOD: spawn
      HF_HOME: /cache
      HF_HUB_CACHE: /cache/.hf-cache
    volumes:
      - /mnt/aetherpro/models:/models
      - /mnt/aetherpro/cache:/cache
      - ./logs/qwen3.5-35b:/logs
    ports:
      - "8101:8000"
    command: >
      /models/cyankiwi/Qwen3.5-35B-A3B-AWQ-4bit
      --trust-remote-code
      --served-model-name qwen3.5-35b
      --host 0.0.0.0
      --port 8000
      --dtype auto
      --kv-cache-dtype fp8
      --gpu-memory-utilization 0.55
      --max-model-len 32768
      --max-num-seqs 4
      --max-num-batched-tokens 4096
      --reasoning-parser qwen3
      --enable-auto-tool-choice
      --tool-call-parser qwen3_coder
      --enable-prefix-caching
      --enable-chunked-prefill
      --generation-config vllm
      --api-key EMPTY
    restart: unless-stopped

  jan-code-4b:
    image: vllm/vllm-openai:nightly
    container_name: jan-code-4b
    runtime: nvidia
    networks:
      - aether-ops
    extra_hosts:
      - host.docker.internal:host-gateway
    env_file:
      - path: .env
        required: false
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      VLLM_WORKER_MULTIPROC_METHOD: spawn
      HF_HOME: /cache
      HF_HUB_CACHE: /cache/.hf-cache
    volumes:
      - /mnt/aetherpro/models:/models
      - /mnt/aetherpro/cache:/cache
      - ./logs/jan-code-4b:/logs
    ports:
      - "8102:8000"
    command: >
      /models/cyankiwi/Jan-code-4b-AWQ-4bit
      --served-model-name jan-code-4b
      --host 0.0.0.0
      --port 8000
      --dtype half
      --kv-cache-dtype fp8
      --gpu-memory-utilization 0.22
      --max-model-len 16384
      --max-num-seqs 6
      --max-num-batched-tokens 4096
      --enable-auto-tool-choice
      --tool-call-parser hermes
      --enable-prefix-caching
      --enable-chunked-prefill
      --generation-config vllm
      --api-key EMPTY
    restart: unless-stopped