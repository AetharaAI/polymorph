# ============================================
# FLEET PROFILE A: Voice Agent Lightweights
# Qwen3.5-9B + Qwen3.5-4B on L40S-90 (48GB)
# Total util: 48% + 30% = 78%
# ============================================

networks:
  aether-ops:
    external: true

services:
  qwen35-9b:
    image: vllm/vllm-openai:nightly
    container_name: qwen35-9b
    runtime: nvidia
    networks:
      - aether-ops
    extra_hosts:
      - host.docker.internal:host-gateway
    env_file:
      - path: .env
        required: false
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      VLLM_WORKER_MULTIPROC_METHOD: spawn
      HF_HOME: /cache
      HF_HUB_CACHE: /cache/.hf-cache
    volumes:
      - /mnt/aetherpro/models:/models
      - /mnt/aetherpro/cache:/cache
      - ./logs/qwen3.5-9b:/logs
    ports:
      - "8101:8000"
    command: >
      /models/cyankiwi/Qwen3.5-9B-AWQ-BF16-INT8
      --served-model-name qwen3.5-9b
      --host 0.0.0.0
      --port 8000
      --dtype auto
      --kv-cache-dtype fp8
      --gpu-memory-utilization 0.48
      --max-model-len 16384
      --max-num-seqs 8
      --max-num-batched-tokens 4096
      --reasoning-parser qwen3
      --enable-auto-tool-choice
      --tool-call-parser qwen3_coder
      --enable-prefix-caching
      --enable-chunked-prefill
      --generation-config vllm
      --api-key EMPTY
    restart: unless-stopped

  qwen35-4b:
    image: vllm/vllm-openai:nightly
    container_name: qwen35-4b
    runtime: nvidia
    networks:
      - aether-ops
    extra_hosts:
      - host.docker.internal:host-gateway
    env_file:
      - path: .env
        required: false
    environment:
      NVIDIA_VISIBLE_DEVICES: all
      VLLM_WORKER_MULTIPROC_METHOD: spawn
      HF_HOME: /cache
      HF_HUB_CACHE: /cache/.hf-cache
    volumes:
      - /mnt/aetherpro/models:/models
      - /mnt/aetherpro/cache:/cache
      - ./logs/qwen3.5-4b:/logs
    ports:
      - "8102:8000"
    command: >
      /models/cyankiwi/Qwen3.5-4B-AWQ-4bit
      --served-model-name qwen3.5-4b
      --host 0.0.0.0
      --port 8000
      --dtype auto
      --kv-cache-dtype fp8
      --gpu-memory-utilization 0.30
      --max-model-len 16384
      --max-num-seqs 8
      --max-num-batched-tokens 4096
      --reasoning-parser qwen3
      --enable-auto-tool-choice
      --tool-call-parser qwen3_coder
      --enable-prefix-caching
      --enable-chunked-prefill
      --generation-config vllm
      --api-key EMPTY
    restart: unless-stopped