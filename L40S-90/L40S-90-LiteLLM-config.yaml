###########################################
# GENERAL SETTINGS
############################################
general_settings:
  master_key: sk-aether-sovereign-master-key-2026
  app_id: aether-os-web
  disable_auth: true
  enable_key_management: true
  database_url: "postgresql://litellm_admin:litellm_admin_ops_2026@triad.aetherpro.tech:5440/litellm"
  store_model_in_db: true
  use_redis_transaction_buffer: true
  redis_url: redis://redis:6379/0

############################################
# ROUTER SETTINGS
############################################
router_settings:
  routing_strategy: "least-busy"
  num_retries: 3
  timeout: 120
  retry_after: 5
  allowed_fails: 3
  cooldown_time: 60

  redis_host: "redis"
  redis_port: 6379

  cache_params:
    type: "redis"
    host: "redis"
    port: 6379
    namespace: "litellm.caching.caching"
    ttl: 86400

  model_group_priority:
    - core_reasoning
    - vision_reasoning
  model_group_weights:
    core_reasoning: 10
    vision_reasoning: 10
  enable_model_group_routing: true
  enable_pre_call_checks: true
  enable_pre_call_cache: true
  enable_post_call_cache: true

  fallbacks:
    - vision_reasoning: ["core_reasoning"]
    - coding: ["core_reasoning"]

############################################
# LITELLM SETTINGS
############################################
litellm_settings:
  cache: true
  cache_params:
    type: "redis"
    host: "redis"
    port: 6379
    namespace: "litellm.caching.caching"
    ttl: 86400

  drop_params: true
  allow_requests_on_db_unavailable: true
  litellm_dashboard: true
  ui: true
  enable_prefix_caching: true

############################################
# MCP TOOLING
############################################
  mcp_aliases:
    "fs": "filesystem_mcp"
    "think": "sequential_thinking_mcp"
    "search": "brave_search_mcp"
    "memory": "memory_mcp"
    "fabric": "fabric_gateway"

############################################
# MCP SERVERS
############################################
mcp_servers:
  filesystem_mcp:
    transport: "stdio"
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-filesystem", "/aether-data"]
    description: "Read and write local files - scoped to /aether-data"

  memory_mcp:
    transport: "stdio"
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-memory"]
    description: "Persistent agent memory store"

  brave_search_mcp:
    transport: "stdio"
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-brave-search"]
    env:
      BRAVE_API_KEY: "BSAE-0AJOooREYnpP9-wOBfGaW1fl3m"

  sequential_thinking_mcp:
    transport: "stdio"
    command: "npx"
    args: ["-y", "@modelcontextprotocol/server-sequential-thinking"]
    description: "Forces structured step-by-step reasoning"

  fabric-gateway:
    url: "https://fabric.perceptor.us/mcp"
    transport: "http"
    headers:
      Authorization: "Bearer dev-shared-secret"

############################################
# SEMANTIC STORE
############################################
semantic_store:
  type: qdrant
  host: triad.aetherpro.tech
  port: 6333
  grpc_port: 6334
  collection_name: litellm_semantic
